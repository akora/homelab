---
# Data Stack Role Tasks (Postgres + Grafana + host-run fuel collector)

- name: Ensure Docker is installed
  ansible.builtin.include_tasks: check_docker.yml

- name: Install git
  become: true
  package:
    name: git
    state: present
  when: ansible_os_family == "Debian"

- name: Create data_stack config directory
  ansible.builtin.file:
    path: "{{ data_stack_config_directory }}"
    state: directory
    mode: '0755'

- name: Create data_stack data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0777'
  with_items:
    - "{{ data_stack_postgres_data_directory }}"
    - "{{ data_stack_grafana_data_directory }}"

- name: Check if Docker network exists
  ansible.builtin.shell: docker network ls | grep {{ data_stack_network_name }}
  register: network_check
  changed_when: false
  failed_when: false

- name: Create Docker network if it doesn't exist
  ansible.builtin.shell: docker network create {{ data_stack_network_name }}
  when: network_check.rc != 0

- name: Clone metrics-pipeline at pinned ref
  ansible.builtin.git:
    repo: "{{ data_stack_metrics_pipeline_repo }}"
    dest: "{{ data_stack_clone_directory }}"
    version: "{{ data_stack_metrics_pipeline_ref }}"
    force: yes

- name: Create Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ data_stack_config_directory }}/docker-compose.yml"
    mode: '0644'

- name: Deploy data stack containers
  community.docker.docker_compose_v2:
    project_src: "{{ data_stack_config_directory }}"
    state: present
  register: data_stack_deploy_result

- name: Show data stack deployment result
  ansible.builtin.debug:
    var: data_stack_deploy_result
    verbosity: 1

- name: Install python3-venv
  become: true
  package:
    name: python3-venv
    state: present
  when: ansible_os_family == "Debian"

- name: Create venv for fuel collector
  ansible.builtin.command: "python3 -m venv {{ data_stack_collector_venv }}"
  args:
    creates: "{{ data_stack_collector_venv }}/bin/python"

- name: Install metrics-pipeline into collector venv
  ansible.builtin.command: "{{ data_stack_collector_venv }}/bin/pip install -e ."
  args:
    chdir: "{{ data_stack_clone_directory }}"
  register: data_stack_collector_pip_install
  changed_when: "'Successfully installed' in data_stack_collector_pip_install.stdout"

- name: Deploy fuel collector run script
  ansible.builtin.template:
    src: run-fuel-collector.sh.j2
    dest: "{{ data_stack_collector_script }}"
    mode: '0700'  # contains the metrics_rw DB password

- name: Install cron
  become: true
  package:
    name: cron
    state: present
  when: ansible_os_family == "Debian"

- name: Ensure cron service is running
  ansible.builtin.systemd:
    name: cron
    state: started
    enabled: yes

- name: Schedule weekly fuel collector run
  ansible.builtin.cron:
    name: "Fuel price collector (EU Oil Bulletin)"
    cron_file: "data-stack-fuel-collector"
    user: root
    minute: "{{ data_stack_collector_schedule.minute }}"
    hour: "{{ data_stack_collector_schedule.hour }}"
    weekday: "{{ data_stack_collector_schedule.weekday }}"
    job: "{{ data_stack_collector_script }} >> /var/log/data-stack-fuel-collector.log 2>&1"

- name: Check Postgres status
  ansible.builtin.shell: docker ps | grep data-stack-postgres
  register: data_stack_postgres_status
  changed_when: false
  failed_when: false

- name: Check Grafana status
  ansible.builtin.shell: docker ps | grep data-stack-grafana
  register: data_stack_grafana_status
  changed_when: false
  failed_when: false

- name: Display Grafana URL
  ansible.builtin.debug:
    msg: "Grafana is available at {{ data_stack_grafana_root_url }}"
  when: data_stack_grafana_status.rc == 0
